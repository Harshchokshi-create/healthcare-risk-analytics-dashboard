<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VitalAI</title>
<style>
body{font-family:Arial;background:#0a0f1e;color:white;padding:20px}
input,select,button{padding:8px;margin:5px}
.card{background:#1a2235;padding:15px;border-radius:10px;margin-top:10px}
</style>
</head>

<body>

<h2>VitalAI — Cardiovascular Risk</h2>

<input id="f-age" placeholder="Age">
<input id="f-bp" placeholder="BP">
<input id="f-chol" placeholder="Cholesterol">
<input id="f-hr" placeholder="Heart Rate">

<button onclick="startAnalysis()">Analyze</button>

<div class="card">
<h3>Result</h3>
<div id="r-level"></div>
<div id="r-score"></div>
</div>

<div class="card">
<h3>Trend (Last 3 Results)</h3>
<canvas id="trendChart" width="300" height="150"></canvas>
</div>

<div class="card">
<h3>AI Report</h3>
<div id="report-body">Waiting...</div>
</div>

<div class="card">
<h3>Chat</h3>
<input id="chat-inp">
<button onclick="sendChat()">Send</button>
<div id="chat-box"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const FLASK_API = "https://vitalai-zc9m.onrender.com";
const FLOWISE_API = "PASTE_YOUR_NEW_FLOWISE_API_HERE";

let trendData = [];
let sessionMemory = "";

// 🔥 MAIN FUNCTION
async function startAnalysis(){

  const age = document.getElementById('f-age').value;
  const bp = document.getElementById('f-bp').value;
  const chol = document.getElementById('f-chol').value;
  const hr = document.getElementById('f-hr').value;

  if(!age||!bp||!chol||!hr){
    alert("Fill all fields");
    return;
  }

  // ⚡ SHOW LOADING TEXT (NOT BLOCKING)
  document.getElementById('r-level').innerText = "Calculating...";
  document.getElementById('report-body').innerText = "Generating AI report...";

  let mlResult;

  // ✅ TRY REAL ML API
  try{
    const res = await fetch(FLASK_API + "/predict",{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        age:+age,
        resting_bp:+bp,
        serum_chol:+chol,
        max_heart_rate:+hr
      })
    });

    mlResult = await res.json();

  }catch(e){
    // 🔥 FALLBACK (NEVER BREAKS)
    let score = 0;

    if(chol>240) score+=3;
    else if(chol>200) score+=2;

    if(bp>140) score+=3;
    else if(bp>120) score+=2;

    if(age>55) score+=2;

    if(hr<120) score+=2;

    const level = score>=7?"HIGH":score>=4?"MEDIUM":"LOW";

    mlResult = {
      risk_level: level,
      risk_score: score
    };
  }

  // ✅ SHOW RESULT INSTANTLY
  document.getElementById('r-level').innerText = mlResult.risk_level;
  document.getElementById('r-score').innerText = "Score: " + mlResult.risk_score;

  // 🔥 TREND FEATURE
  trendData.push(mlResult.risk_score);
  if(trendData.length>3) trendData.shift();
  drawChart();

  // 🤖 FLOWISE (BACKGROUND)
  try{
    const aiRes = await fetch(FLOWISE_API,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        question:`Patient age ${age}, BP ${bp}, Cholesterol ${chol}. Risk is ${mlResult.risk_level}. Give medical advice.`
      })
    });

    const data = await aiRes.json();
    const report = data.text || data.output || "No AI response";

    sessionMemory = report;
    document.getElementById('report-body').innerText = report;

  }catch(e){
    document.getElementById('report-body').innerText = "AI unavailable (Flowise limit reached)";
  }
}

// 🔥 TREND CHART
function drawChart(){
  const ctx = document.getElementById('trendChart');

  if(window.chart) window.chart.destroy();

  window.chart = new Chart(ctx,{
    type:'line',
    data:{
      labels:["1","2","3"],
      datasets:[{
        label:'Risk Trend',
        data:trendData
      }]
    }
  });
}

// 🔥 CHAT
async function sendChat(){
  const msg = document.getElementById('chat-inp').value;

  if(!msg) return;

  const box = document.getElementById('chat-box');
  box.innerHTML += "<div>You: "+msg+"</div>";

  try{
    const res = await fetch(FLOWISE_API,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        question:`${msg}\nContext:\n${sessionMemory}`
      })
    });

    const data = await res.json();
    const reply = data.text || "No reply";

    box.innerHTML += "<div>AI: "+reply+"</div>";

  }catch(e){
    box.innerHTML += "<div>AI unavailable</div>";
  }
}
</script>

</body>
</html>
